version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    container_name: consentchain-db
    environment:
      POSTGRES_USER: consentchain
      POSTGRES_PASSWORD: consentchain_password
      POSTGRES_DB: consentchain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consentchain"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: consentchain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consentchain-api
    environment:
      - ALGORAND_NODE_URL=https://testnet-api.algonode.cloud
      - ALGORAND_INDEXER_URL=https://testnet-idx.algonode.cloud
      - ALGORAND_NETWORK=testnet
      - DATABASE_URL=postgresql+asyncpg://consentchain:consentchain_password@postgres:5432/consentchain
      - REDIS_URL=redis://redis:6379/0
      - API_SECRET_KEY=${API_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    image: nginx:alpine
    container_name: consentchain-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: consentchain-network
