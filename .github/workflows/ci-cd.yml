name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install ruff mypy black
          pip install -e .

      - name: Run ruff
        run: ruff check . --output-format=github

      - name: Run black check
        run: black --check .

      - name: Run mypy
        run: mypy api/ core/ sdk/ --ignore-missing-imports

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: consentchain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/consentchain_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
        run: |
          pytest tests/ -v --cov=api --cov=core --cov=sdk --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

  build-contracts:
    name: Build AlgoKit Contracts
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install AlgoKit
        run: pip install algokit-cli

      - name: Build contracts
        run: |
          cd contracts_v2
          algokit compile python consent_registry.py
          algokit compile python audit_trail.py

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: contracts_v2/artifacts/

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard-v2/package-lock.json

      - name: Install dependencies
        working-directory: dashboard-v2
        run: npm ci

      - name: Build
        working-directory: dashboard-v2
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboard-v2/dist/

  build-sdk-python:
    name: Build Python SDK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build sdk-async/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-python
          path: dist/

  build-sdk-typescript:
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: sdk-ts/package-lock.json

      - name: Install dependencies
        working-directory: sdk-ts
        run: npm ci

      - name: Build
        working-directory: sdk-ts
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-typescript
          path: sdk-ts/dist/

  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs:
      [build-contracts, build-dashboard, build-sdk-python, build-sdk-typescript]
    if: github.ref == 'refs/heads/develop'
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Deploy contracts to Testnet
        env:
          ALGORAND_MNEMONIC: ${{ secrets.ALGORAND_MNEMONIC_TESTNET }}
          ALGORAND_NODE_URL: https://testnet-api.algonode.cloud
        run: |
          pip install py-algorand-sdk
          python scripts/deploy_contracts.py --network testnet

      - name: Deploy API to staging
        run: |
          echo "Deploy to staging environment"

  deploy-mainnet:
    name: Deploy to Mainnet
    runs-on: ubuntu-latest
    needs:
      [build-contracts, build-dashboard, build-sdk-python, build-sdk-typescript]
    if: github.event_name == 'release'
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Deploy contracts to Mainnet
        env:
          ALGORAND_MNEMONIC: ${{ secrets.ALGORAND_MNEMONIC_MAINNET }}
          ALGORAND_NODE_URL: https://mainnet-api.algonode.cloud
        run: |
          pip install py-algorand-sdk
          python scripts/deploy_contracts.py --network mainnet

      - name: Deploy API to production
        run: |
          echo "Deploy to production environment"

  publish-sdk-python:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdk-python, deploy-mainnet]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install twine
        run: pip install twine

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  publish-sdk-typescript:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: [build-sdk-typescript, deploy-mainnet]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-typescript
          path: sdk-ts/dist/

      - name: Publish to npm
        working-directory: sdk-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
