# Docker Compose override for devcontainer
# This file provides PostgreSQL and Redis services for the devcontainer

version: "3.8"

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - DATABASE_URL=postgresql+asyncpg://consentchain:consentchain@postgres:5432/consentchain
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    network_mode: service:postgres

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: consentchain
      POSTGRES_USER: consentchain
      POSTGRES_PASSWORD: consentchain
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consentchain"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
