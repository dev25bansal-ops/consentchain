apiVersion: apps/v1
kind: Deployment
metadata:
  name: consentchain-api-canary
  labels:
    app: consentchain-api
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consentchain-api
      track: canary
  template:
    metadata:
      labels:
        app: consentchain-api
        track: canary
    spec:
      containers:
      - name: api
        image: ghcr.io/consentchain/consentchain-api:canary
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: consentchain-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: consentchain-api-canary
spec:
  selector:
    app: consentchain-api
    track: canary
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consentchain-canary
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  rules:
  - host: api.consentchain.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: consentchain-api-canary
            port:
              number: 80
