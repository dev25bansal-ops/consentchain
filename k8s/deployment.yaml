apiVersion: apps/v1
kind: Deployment
metadata:
  name: consentchain-api
  labels:
    app: consentchain-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: consentchain-api
  template:
    metadata:
      labels:
        app: consentchain-api
    spec:
      containers:
      - name: api
        image: consentchain/api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: consentchain-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: consentchain-api
spec:
  selector:
    app: consentchain-api
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: Secret
metadata:
  name: consentchain-secrets
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production"
  DATABASE_URL: "postgresql+asyncpg://user:password@db:5432/consentchain"
  REDIS_URL: "redis://redis:6379"
  METRICS_API_KEY: "change-me-in-production"
  KEY_ENCRYPTION_SEED: "change-me-in-production"
